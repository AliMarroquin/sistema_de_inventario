{% extends 'base.html'%}

{% block title %}
Inventario
{% endblock %}

{% block page_litle %}
Inventario
{% endblock %}

{% block content %}

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<div class="top-bar">
    <input type="text" placeholder="Buscar Equipo..."
    class="search-input">

    <select class="filter-select">
        <option>Activo</option>
        <option>En Reparación</option>
        <option>Baja</option>
    </select>

    <input type="text"
    placeholder="Buscar ubicación..."
    class="search-input">

</div>

<div class="table-container">

    <table>

        <thead>
            <tr>
                <th>Tipo</th>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Serie</th>
                <th>Usuario</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody> 

            <tr>
                <td>Laptop</td>
                <td>Dell</td>
                <td>AT3700</td>
                <td>000001</td>
                <td>Fabiola</td>
                <td class="Activo">Activo</td>

                <td class="actions">
                    <button class="view-btn">
                        <i class="bi bi-eye-fill"></i>
                    </button>

                    <button class="edit-btn">
                        <i class="bi bi-pencil-fill"></i>
                    </button>
                    
                </td>

            </tr>

            <tr>
                <td>PC</td>
                <td>HP</td>
                <td>HP-OO2</td>
                <td>Admin</td>
                <td>Soporte Técnico</td>
                <td class="reparación">En Reparación</td> 

                <td class="actions">

                    <button class="view-btn">
                        <i class="bi bi-eye-fill"></i>
                    </button>

                    <button class="edit-btn">
                        <i class="bi bi-pencil-fill"></i>
                    </button>
                </td>
                
            </tr>

        </tbody>

    </table>
</div>

{% endblock %}
