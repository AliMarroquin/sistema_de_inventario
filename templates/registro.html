{% extends 'base.html' %}

{% block title %}
Registro
{% endblock %}

{% block page_title %}
Registro de Equipos
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/registro.css')}}">
{% endblock %}

{% block content %}

<div class="form-container">

    <!-- Columna izquierda -->
    <div class="form-box">

        <h2>Información Técnica</h2>

        <form method="POST">

             <label>Tipo de Equipo</label>
             <input 
                type="text"
                name="tipo_equipo"
                placeholder="Ejemplo: Laptop"
            >
            

            <label>Marca</label>
            <input 
                type="text"
                name="marca"
                placeholder="Ejemplo: Dell"
            >

            <label>Modelo</label>
            <input 
                type="text"
                name="modelo"
                placeholder="Ejemplo: Latitude 5420"
            >

            <label>Número de Serie</label>
            <input 
                type="text"
                name="numero_serie"
                placeholder="Ejemplo: DL-001"
            >

            <label>Procesador</label>
            <input 
                type="text"
                name="procesador"
                placeholder="Ejemplo: Intel i5"
            >

            <label>Memoria RAM</label>
            <input 
                type="text"
                name="ram"
                placeholder="Ejemplo: 16GB"
            >

            <label>Disco Duro</label>
            <input 
                type="text"
                name="disco_duro"
                placeholder="Ejemplo: 512GB SSD"
            >
        
    </div>

    <!-- Columna derecha -->
    <div class="form-box">

        <h2>Información de Control</h2>


            <label>Sistema Operativo</label>
            <input 
                type="text"
                name="sistema_operativo"
                placeholder="Ejemplo: Windows"
            >
           

            <label>Software Instalado</label>
            <textarea 
                name="software_instalado"
                placeholder="Office, Chrome, AnyDesk..."
            ></textarea>

            <label>Usuario Asignado</label>
            <input 
                type="text"
                name="usuario_asignado"
                placeholder="Nombre del usuario"
            >

            <label>Ubicación Física</label>
            <input 
                type="text"
                name="ubicacion"
                placeholder="Ejemplo: Recepción"
            >

            <label>Estado</label>
            <select name="estado">

                <option value="Disponible">
                    Disponible
                </option>

                <option value="Activo">
                    Activo
                </option>

                <option value="En reparación">
                   En reparación 
                </option>

                <option value="De baja">
                    De baja 
                </option>

            </select>

            <label>Observaciones</label>
            <textarea 
                name="observaciones"
                placeholder="Observaciones del equipo..."
            ></textarea>

            
            <div class="buttons">

                <button type="submit" class="save-btn">
                    Guardar
                </button>

                <button type="reset" class="cancel-btn">
                    Cancelar
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
